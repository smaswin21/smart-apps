<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>MyVendingMachine — Login</title>
  <style>
    body { font-family: sans-serif; background: #0d1117; color: #e6edf3; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 32px; width: 320px; }
    h2 { margin: 0 0 20px; text-align: center; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 4px; margin-top: 12px; }
    input { width: 100%; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: #e6edf3; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; margin-top: 16px; padding: 9px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-login { background: #238636; color: white; }
    .btn-register { background: #1f6feb; color: white; }
    .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 13px; }
    .flash.success { background: #0d2b1a; border: 1px solid #2ecc71; color: #2ecc71; }
    .flash.error   { background: #2b0d0d; border: 1px solid #e74c3c; color: #e74c3c; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🎟 MyVendingMachine</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <label>Username</label>
      <input type="text" name="username" required autofocus/>
      <label>Password</label>
      <input type="password" name="password" required/>
      <button type="submit" name="action" value="login" class="btn-login">Log In</button>
      <button type="submit" name="action" value="register" class="btn-register">Register</button>
    </form>
  </div>
</body>
</html>
